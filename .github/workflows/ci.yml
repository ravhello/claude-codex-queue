name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Python ${{ matrix.python-version }} / WSL-compatible
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"
          - "3.14"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m py_compile claude_codex_queue/*.py claude_vscode_queue/*.py
      - name: Unit tests
        run: python -m unittest discover -s tests -v

  windows-smoke:
    name: Windows package smoke test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Compile and inspect CLI
        run: |
          python -m py_compile claude_codex_queue/*.py claude_vscode_queue/*.py
          python -m claude_codex_queue --help
      - name: Build wheel and source distribution
        run: |
          python -m pip install --disable-pip-version-check build twine
          python -m build
          python -m twine check dist/*
      - name: Install and import wheel
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem dist/*.whl | Select-Object -First 1).FullName
          python -m pip install --force-reinstall $wheel
          python -c "import claude_codex_queue; print(claude_codex_queue.__version__)"

  package:
    name: Reproducible package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build and validate
        run: |
          python -m pip install --disable-pip-version-check build twine
          python -m build
          python -m twine check dist/*
